<!DOCTYPE html>
<html lang="en">
<head>
  <title>右k</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/css/bootstrap.min.css">
  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.1.1/jquery.min.js"></script>
  <script src="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/js/bootstrap.min.js"></script>
  <style>
  .carousel-inner > .item > img,
  .carousel-inner > .item > a > img {
      width: 70%;
      margin: auto;
  }
  </style>
</head>
<body>
    <!--Head-->
    <div class="container">
        <h1 style="font-size:400%;text-align:center;color:SteelBlue;font-family:verdana;">
          Welcome to right ck
        </h1>
    </div>

    <!--Carousel-->
    <div class="container">
      <br>
      <div id="myCarousel" class="carousel slide" data-ride="carousel">
        <!-- Indicators -->
        <ol class="carousel-indicators">
          <li data-target="#myCarousel" data-slide-to="0" class="active"></li>
          <li data-target="#myCarousel" data-slide-to="1"></li>
          <li data-target="#myCarousel" data-slide-to="2"></li>
          <li data-target="#myCarousel" data-slide-to="3"></li>
        </ol>

    <!-- Wrapper for slides -->
    <div class="carousel-inner" role="listbox">

      <div class="item active">
        <img src="images/IMAG0944.jpg" alt="Tabletop_Game" width="460" height="345">
        <div class="carousel-caption">
          <h3>桌遊山</h3>
          <p>The heaven for tabletop game lover.</p>
        </div>
      </div>

      <div class="item">
        <img src="images/IMAG0943.jpg" alt="Discussion_Space" width="460" height="345">
        <div class="carousel-caption">
          <h3>討論空間</h3>
          <p>A place for generating splendid inspiration.</p>
        </div>
      </div>

      <div class="item">
        <img src="images/IMAG0941.jpg" alt="C&P" width="460" height="345">
        <div class="carousel-caption">
          <h3>C & P</h3>
          <p>Computers and printers .</p>
          <p>And play games !?</p>
        </div>
      </div>

      <div class="item">
        <img src="images/IMAG0946.jpg" alt="All_kind_of_balls" width="460" height="345">
        <div class="carousel-caption">
          <h3>球窩</h3>
          <p>Exercise for your health !</p>
        </div>
      </div>

    </div>

      <!-- Left and right controls -->
      <a class="left carousel-control" href="#myCarousel" role="button" data-slide="prev">
        <span class="glyphicon glyphicon-chevron-left" aria-hidden="true"></span>
        <span class="sr-only">Previous</span>
      </a>
      <a class="right carousel-control" href="#myCarousel" role="button" data-slide="next">
        <span class="glyphicon glyphicon-chevron-right" aria-hidden="true"></span>
        <span class="sr-only">Next</span>
      </a>
    </div>
  </div>

  <!--modal_part-->
  <div class="container">
    <h3 style="font-family:verdana;color:white;">
      ↓↓ Click ↓↓ Want to know how to live in ck ?
    </h3>
    <!-- Trigger the modal with a button -->
    <button type="button" class="btn btn-link btn-md" data-toggle="modal" data-target="#myModal" style="color:white;">
      Come here...
    </button>

    <!-- Modal -->
    <div class="modal fade" id="myModal" role="dialog">
      <div class="modal-dialog">

        <!-- Modal content-->
        <div class="modal-content">
          <div class="modal-header">
            <button type="button" class="close" data-dismiss="modal">&times;</button>
            <h4 class="modal-title" style="text-align:center;">定居秘笈</h4>
          </div>
          <div class="modal-body">
            <p>明天再想zzz</p>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-default" data-dismiss="modal">Close</button>
          </div>
        </div>

      </div>
     </div>
  
  </div>
</body>
</html>
